<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>儿童祝福明信片展示｜GitHub版</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="page">
    <header>
      <div class="eyebrow">✉ 正在送达孩子们的祝福</div>
      <h1>把祝福寄给你</h1>
      <p class="subtitle">每一张明信片，都是一份温柔的陪伴。</p>
      <p class="english">Postcards of Love</p>
      <p class="tips" id="pathTip">GitHub版：请上传 index.html 和整个 images 文件夹。</p>
    </header>

    <section class="mailbox-container" aria-label="祝福邮筒口">
      <div class="mailbox-board">
        <div class="slot"></div>
      </div>
      <p class="mailbox-text">Blessings are on the way...</p>
    </section>

    <section class="stage" id="stage" aria-label="明信片动画展示区"></section>

    <footer>
      <p class="footer-text">我们把祝福送出去，也在回应中收获爱。</p>
      <div class="btn-group">
        <button class="btn btn-primary" id="btnViewAll">查看全部祝福</button>
        <button class="btn" onclick="alert('这里可以后续连接留言表单或问卷星链接。')">写下你的祝福</button>
      </div>
    </footer>
  </main>

  <section class="modal" id="modal" aria-label="全部祝福明信片">
    <div class="modal-header">
      <h2>全部祝福明信片</h2>
      <button class="close-btn" id="btnClose" aria-label="关闭">×</button>
    </div>
    <div class="gallery-grid" id="galleryGrid"></div>
  </section>
  <script src="js/script.js"></script>
</body>
</html>
