<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>儿童祝福明信片展示｜GitHub版</title>
  <style>
    :root {
      --bg-start: #fff8ef;
      --bg-mid: #f9e6ee;
      --bg-end: #e8f5ff;
      --text-main: #4e5962;
      --text-soft: #7f8790;
      --paper: #fffdf8;
      --accent: #9b87c8;
      --accent-2: #c7b8e8;
      --accent-deep: #7d67ad;
      --accent-light: #efe8fb;
      --shadow: 0 22px 50px rgba(91, 75, 56, .15), 0 8px 18px rgba(91, 75, 56, .08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      background:
        linear-gradient(rgba(255,255,255,.18), rgba(255,255,255,.26)),
        url("images/background.jpg") center center / cover no-repeat fixed;
    }

    .bg-decorations {
      display: none;
    }
    .float {
      position: absolute;
      opacity: .36;
      font-size: clamp(18px, 3vw, 34px);
      animation: drift 11s ease-in-out infinite alternate;
    }
    .float:nth-child(1) { top: 14%; left: 8%; animation-delay: 0s; }
    .float:nth-child(2) { top: 24%; right: 12%; animation-delay: 1.2s; }
    .float:nth-child(3) { bottom: 23%; left: 12%; animation-delay: 2.4s; }
    .float:nth-child(4) { bottom: 30%; right: 17%; animation-delay: 3.6s; }
    .cloud {
      position: absolute; width: 160px; height: 54px; border-radius: 999px;
      background: rgba(255,255,255,.68); filter: blur(1px);
    }
    .cloud::before, .cloud::after { content: ""; position: absolute; background: inherit; border-radius: 50%; }
    .cloud::before { width: 70px; height: 70px; left: 28px; top: -30px; }
    .cloud::after { width: 86px; height: 86px; left: 78px; top: -42px; }
    .cloud.one { top: 11%; left: 15%; animation: cloudMove 18s ease-in-out infinite alternate; }
    .cloud.two { top: 20%; right: 8%; transform: scale(.65); animation: cloudMove 21s ease-in-out infinite alternate-reverse; }

    @keyframes drift {
      from { transform: translate3d(0, 0, 0) rotate(-4deg); }
      to { transform: translate3d(20px, -18px, 0) rotate(5deg); }
    }
    @keyframes cloudMove {
      from { transform: translateX(0) scale(var(--s, 1)); }
      to { transform: translateX(42px) scale(var(--s, 1)); }
    }

    .page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }
    header { text-align: center; padding: 42px 20px 16px; }
    .eyebrow {
      display: inline-flex; gap: 8px; align-items: center;
      padding: 6px 14px; border-radius: 999px; background: rgba(255,255,255,.6);
      color: var(--accent-deep); font-size: 14px; margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(155, 135, 200, .16);
    }
    h1 {
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 700;
      letter-spacing: .08em;
      color: #56636c;
      margin-bottom: 10px;
    }
    .subtitle { color: var(--text-soft); font-size: clamp(15px, 2vw, 18px); }
    .english {
      margin-top: 6px;
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      color: var(--accent);
      font-size: clamp(18px, 3vw, 26px);
    }

    .mailbox-container {
      width: 100%; display: flex; flex-direction: column; align-items: center;
      position: relative; z-index: 5; margin-top: 16px;
    }
    .mailbox-board {
      width: min(520px, 86vw); height: 126px; border-radius: 28px;
      background: rgba(255,253,247,.9);
      border: 1px solid rgba(255,255,255,.8);
      box-shadow: 0 20px 50px rgba(99,84,62,.12), inset 0 1px 0 rgba(255,255,255,.95);
      position: relative; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
    }
    .mailbox-board::before, .mailbox-board::after {
      content:""; position:absolute; top: 18px; width: 10px; height: 10px; border-radius: 50%;
      background: #e5d8c8; box-shadow: inset 0 2px 2px rgba(0,0,0,.08);
    }
    .mailbox-board::before { left: 28px; }
    .mailbox-board::after { right: 28px; }
    .slot {
      width: min(390px, 68vw); height: 38px; border-radius: 999px;
      background: linear-gradient(to bottom, #fffaf1, #f1e8d9);
      box-shadow: 0 12px 22px rgba(95,76,54,.16), inset 0 -5px 7px rgba(105,83,61,.08);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .slot::after {
      content:""; width: calc(100% - 34px); height: 12px; border-radius: 999px;
      background: linear-gradient(to bottom, #554d45, #1f1e1d);
      box-shadow: inset 0 4px 5px rgba(0,0,0,.45);
    }
    .mailbox-text {
      margin-top: 14px; color: #74808a; font-size: 15px; letter-spacing: .03em;
    }

    .stage {
      position: relative; width: 100%; min-height: 690px; flex: 1; overflow: hidden;
      display: flex; justify-content: center;
    }
    .postcard {
      position: absolute;
      left: 50%; top: 0;
      width: min(520px, 88vw);
      background: var(--paper);
      border-radius: 18px;
      padding: 18px 18px 42px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateX(-50%) translateY(-110px) scale(.84) rotate(0deg);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.86);
      animation: postcardFlow 6.4s cubic-bezier(.2,.75,.24,1) forwards;
    }
    .postcard::before {
      content:""; position:absolute; inset:0; pointer-events:none; opacity:.22;
      background-image:
        radial-gradient(rgba(96, 72, 49, .18) .8px, transparent .8px),
        linear-gradient(120deg, rgba(255,255,255,.55), transparent 45%, rgba(255,232,196,.26));
      background-size: 8px 8px, 100% 100%;
      mix-blend-mode: multiply;
    }
    .postcard:hover { animation-play-state: paused; transform: translateX(-50%) translateY(96px) scale(1.02) rotate(var(--rot, 1deg)) !important; }
    @keyframes postcardFlow {
      0% { opacity: 0; transform: translateX(-50%) translateY(-120px) scale(.78) rotate(0deg); filter: blur(2px); }
      18% { opacity: 1; transform: translateX(-50%) translateY(42px) scale(.94) rotate(calc(var(--rot) * .55)); filter: blur(0); }
      35% { opacity: 1; transform: translateX(-50%) translateY(96px) scale(1) rotate(var(--rot)); }
      68% { opacity: 1; transform: translateX(-50%) translateY(110px) scale(1) rotate(var(--rot)); }
      100% { opacity: 0; transform: translateX(-50%) translateY(385px) scale(.9) rotate(calc(var(--rot) * 1.6)); filter: blur(.8px); }
    }
    .postcard-img-container {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      min-height: 260px;
      background: linear-gradient(135deg, #f7edf0, #eaf5fb);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.75), inset 0 0 24px rgba(0,0,0,.04);
    }
    /* 竖版明信片适配：加载图片后 JS 会自动给容器添加 portrait-image 类，避免被裁切 */
    .postcard-img-container.portrait-image {
      aspect-ratio: auto;
      height: clamp(360px, 56vh, 520px);
    }
    .postcard-img-container.landscape-image {
      aspect-ratio: 4 / 3;
      height: auto;
    }
    .postcard-img-container img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* 关键：完整显示图片，不裁切竖版明信片 */
      object-position: center;
      display: block;
      position: relative;
      z-index: 2;
    }
    .placeholder {
      position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; color: #aeb7bf; font-size: 14px; z-index: 1;
    }
    .placeholder .icon { font-size: 34px; }
    .caption-line {
      position: absolute; left: 22px; right: 22px; bottom: 13px;
      display: flex; justify-content: space-between; align-items: center;
      color: #848b91; font-size: 13px; letter-spacing: .04em;
    }
    .stamp {
      border: 1px dashed rgba(155,135,200,.75); color: var(--accent-deep); border-radius: 8px;
      padding: 4px 8px; font-size: 12px; background: rgba(255,255,255,.46);
    }

    footer {
      position: relative; z-index: 6;
      text-align: center; padding: 24px 18px 34px;
      background: linear-gradient(to top, rgba(248,245,255,.72), transparent);
    }
    .footer-text { color: var(--text-soft); font-size: 15px; margin-bottom: 18px; }
    .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
    .btn {
      border: 0; border-radius: 999px; padding: 12px 22px; cursor: pointer;
      font-weight: 700; color: var(--text-main); background: rgba(255,255,255,.76);
      box-shadow: 0 8px 20px rgba(93,74,52,.09); transition: .25s ease;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 14px 26px rgba(93,74,52,.13); }
    .btn-primary { background: var(--accent); color: #fff; }

    .modal {
      position: fixed; inset: 0; z-index: 100; background: rgba(250,247,255,.96);
      opacity: 0; pointer-events: none; transition: opacity .28s ease;
      display: flex; flex-direction: column;
    }
    .modal.active { opacity: 1; pointer-events: auto; }
    .modal-header {
      height: 72px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; background: rgba(255,255,255,.76); box-shadow: 0 4px 16px rgba(0,0,0,.05);
    }
    .modal-header h2 { font-size: 22px; color: #56636c; }
    .close-btn { border: 0; background: #fff; border-radius: 50%; width: 42px; height: 42px; font-size: 22px; cursor: pointer; color: #6d747a; }
    .gallery-grid {
      overflow-y: auto; padding: 28px;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 24px;
    }
    .gallery-card {
      background: var(--paper); border-radius: 16px; padding: 12px 12px 34px;
      box-shadow: 0 16px 32px rgba(91,75,56,.12);
      position: relative; transition: transform .25s ease;
    }
    .gallery-card:hover { transform: translateY(-4px) rotate(.6deg); }
    .gallery-card .postcard-img-container { border-radius: 10px; min-height: 180px; }
    .gallery-card .postcard-img-container.portrait-image { height: 330px; min-height: 330px; }
    .gallery-card .caption-line { left: 14px; right: 14px; bottom: 9px; }

    .tips {
      display:none;
      margin: 12px auto 0;
      width: min(720px, 90vw);
      padding: 10px 14px;
      background: rgba(255,255,255,.6);
      border: 1px solid rgba(255,255,255,.8);
      border-radius: 14px;
      color: #8a7e73;
      font-size: 13px;
      line-height: 1.7;
    }

    @media (max-width: 760px) {
      header { padding-top: 32px; }
      .mailbox-board { height: 106px; border-radius: 22px; }
      .stage { min-height: 590px; }
      .postcard { width: min(330px, 86vw); padding: 12px 12px 34px; border-radius: 14px; }
      @keyframes postcardFlow {
        0% { opacity: 0; transform: translateX(-50%) translateY(-105px) scale(.78) rotate(0deg); filter: blur(2px); }
        18% { opacity: 1; transform: translateX(-50%) translateY(38px) scale(.94) rotate(calc(var(--rot) * .55)); filter: blur(0); }
        35% { opacity: 1; transform: translateX(-50%) translateY(78px) scale(1) rotate(var(--rot)); }
        68% { opacity: 1; transform: translateX(-50%) translateY(92px) scale(1) rotate(var(--rot)); }
        100% { opacity: 0; transform: translateX(-50%) translateY(330px) scale(.9) rotate(calc(var(--rot) * 1.6)); filter: blur(.8px); }
      }
      .postcard-img-container.portrait-image { height: min(56vh, 430px); min-height: 330px; }
      .gallery-card .postcard-img-container.portrait-image { height: 230px; min-height: 230px; }
      .gallery-grid { padding: 18px; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 16px; }
      .caption-line { font-size: 11px; }
    }
  </style>
</head>

    const stage = document.getElementById('stage');
    const modal = document.getElementById('modal');
    const galleryGrid = document.getElementById('galleryGrid');
    const btnViewAll = document.getElementById('btnViewAll');
    const btnClose = document.getElementById('btnClose');
    const pathTip = document.getElementById('pathTip');

    let currentIndex = 0;
    let timer = null;
    const intervalMs = 2800; // 在这里调整明信片出现间隔，数值越小出现越快

    function createImageBlock(data) {
      const wrap = document.createElement('div');
      wrap.className = 'postcard-img-container';
      wrap.innerHTML = `
        <div class="placeholder"><div class="icon">✉</div><div>图片未加载，请检查 images 文件夹</div></div>
        <img src="${data.image}" alt="儿童祝福明信片 ${data.number || ''}" loading="eager">
      `;
      const img = wrap.querySelector('img');
      img.addEventListener('error', () => {
        img.style.display = 'none';
        pathTip.style.display = 'block';
      });
      img.addEventListener('load', () => {
        img.style.display = 'block';
        // 自动判断横版/竖版：竖版明信片完整显示，不再被裁切
        wrap.classList.remove('portrait-image', 'landscape-image');
        if (img.naturalHeight > img.naturalWidth * 1.08) {
          wrap.classList.add('portrait-image');
        } else {
          wrap.classList.add('landscape-image');
        }
      });
      return wrap;
    }

    function createPostcard(data, gallery = false) {
      const card = document.createElement('article');
      card.className = gallery ? 'gallery-card' : 'postcard';
      const rot = ((Math.random() * 6) - 3).toFixed(2) + 'deg';
      card.style.setProperty('--rot', rot);
      card.appendChild(createImageBlock(data));

      const caption = document.createElement('div');
      caption.className = 'caption-line';
      caption.innerHTML = `<span>FROM：${data.from || '孩子们'}</span><span class="stamp">${data.stamp || 'LOVE'}</span>`;
      card.appendChild(caption);
      return card;
    }

    function showNextPostcard() {
      if (!postcards.length) return;
      const data = postcards[currentIndex];
      const card = createPostcard(data, false);
      stage.appendChild(card);
      setTimeout(() => {
        if (card && card.parentNode) card.parentNode.removeChild(card);
      }, 6700);
      currentIndex = (currentIndex + 1) % postcards.length;
    }

    function startLoop() {
      stopLoop();
      showNextPostcard();
      timer = setInterval(showNextPostcard, intervalMs);
    }

    function stopLoop() {
      if (timer) clearInterval(timer);
      timer = null;
    }

    function openGallery() {
      stopLoop();
      galleryGrid.innerHTML = '';
      postcards.forEach((data) => galleryGrid.appendChild(createPostcard(data, true)));
      modal.classList.add('active');
    }

    function closeGallery() {
      modal.classList.remove('active');
      startLoop();
    }

    btnViewAll.addEventListener('click', openGallery);
    btnClose.addEventListener('click', closeGallery);
    modal.addEventListener('click', (event) => {
      if (event.target === modal) closeGallery();
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && modal.classList.contains('active')) closeGallery();
    });

    document.addEventListener('DOMContentLoaded', startLoop);
  </script>
